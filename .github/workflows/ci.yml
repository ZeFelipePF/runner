name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build assinatura
        working-directory: assinatura
        run: go build ./...

      - name: Test assinatura
        working-directory: assinatura
        run: go test ./... -v

      - name: Build simulador
        working-directory: simulador
        run: go build ./...

      - name: Test simulador
        working-directory: simulador
        run: go test ./... -v

  test-assinador:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make mvnw executable
        if: runner.os != 'Windows'
        working-directory: assinador
        run: chmod +x mvnw

      - name: Test assinador
        working-directory: assinador
        run: ./mvnw verify
        shell: bash

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Lint assinatura
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: assinatura

      - name: Lint simulador
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: simulador
